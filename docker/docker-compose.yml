---
# Multi-Broker Kafka Cluster (KRaft mode) + PostgreSQL
# See docs/design/week1_kafka_postgres_docker_setup.md for design rationale.

name: streaming-feature-store

networks:
  feature-store-net:
    driver: bridge

volumes:
  kafka-1-data:
  kafka-2-data:
  kafka-3-data:
  postgres-data:

x-kafka-common-env: &kafka-common-env
  CLUSTER_ID: "3bCfH63Tm2bFuFGE2D5UAw"
  KAFKA_PROCESS_ROLES: "broker,controller"
  KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
  KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
  KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "2"
  KAFKA_DEFAULT_REPLICATION_FACTOR: "3"
  KAFKA_MIN_INSYNC_REPLICAS: "2"
  KAFKA_NUM_PARTITIONS: "12"
  KAFKA_LOG_RETENTION_HOURS: "168"
  KAFKA_HEAP_OPTS: "-Xmx512m -Xms512m"
  KAFKA_LOG_DIRS: "/var/lib/kafka/data"

services:

  # ---------------------------------------------------------------------------
  # Kafka broker 1 — KRaft combined mode (broker + controller)
  # ---------------------------------------------------------------------------
  kafka-1:
    image: apache/kafka:3.9.0
    container_name: kafka-1
    hostname: kafka-1
    networks:
      - feature-store-net
    ports:
      - "19092:19092"
    volumes:
      - kafka-1-data:/var/lib/kafka/data
    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: "1"
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:9092,CONTROLLER://kafka-1:9093,EXTERNAL://0.0.0.0:19092"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-1:9092,EXTERNAL://localhost:19092"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "2.0"

  # ---------------------------------------------------------------------------
  # Kafka broker 2 — KRaft combined mode (broker + controller)
  # ---------------------------------------------------------------------------
  kafka-2:
    image: apache/kafka:3.9.0
    container_name: kafka-2
    hostname: kafka-2
    networks:
      - feature-store-net
    ports:
      - "19093:19093"
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: "2"
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:9092,CONTROLLER://kafka-2:9093,EXTERNAL://0.0.0.0:19093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-2:9092,EXTERNAL://localhost:19093"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "2.0"

  # ---------------------------------------------------------------------------
  # Kafka broker 3 — KRaft combined mode (broker + controller)
  # ---------------------------------------------------------------------------
  kafka-3:
    image: apache/kafka:3.9.0
    container_name: kafka-3
    hostname: kafka-3
    networks:
      - feature-store-net
    ports:
      - "19094:19094"
    volumes:
      - kafka-3-data:/var/lib/kafka/data
    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: "3"
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:9092,CONTROLLER://kafka-3:9093,EXTERNAL://0.0.0.0:19094"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-3:9092,EXTERNAL://localhost:19094"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "2.0"

  # ---------------------------------------------------------------------------
  # PostgreSQL 17
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17
    container_name: postgres
    hostname: postgres
    networks:
      - feature-store-net
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: feature_store
      POSTGRES_USER: featurestore
      POSTGRES_PASSWORD: featurestore_dev
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=16MB
      - -c
      - max_connections=50
      - -c
      - wal_level=logical
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U featurestore -d feature_store"
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
